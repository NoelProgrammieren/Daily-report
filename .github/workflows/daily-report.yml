name: Daily Stock Report

on:
  schedule:
    # 19:00 Europe/Berlin entspricht 17:00 UTC (Sommerzeit) bzw. 18:00 UTC (Winterzeit).
    # Wir triggern zu beiden Zeiten — der Python-Skript prüft die lokale Berlin-Zeit
    # und überspringt den Lauf, wenn es nicht ~19:00 ist.
    - cron: '0 17 * * 1-5'
    - cron: '0 18 * * 1-5'
  workflow_dispatch:
    inputs:
      force:
        description: 'Lauf erzwingen, auch wenn nicht 19:00 Berlin Zeit'
        required: false
        default: 'false'

permissions:
  contents: write

concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FORCE_RUN: ${{ github.event.inputs.force == 'true' && '1' || '0' }}
          PYTHONUNBUFFERED: '1'
        timeout-minutes: 12
        run: python -u generate_report.py

      - name: Commit and push changes
        id: commit_push
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          PATHS="reports calendar.json hot_takes.json forecast_data.json market_indices.json"
          if [ -n "$(git status --porcelain $PATHS)" ]; then
            git add $PATHS
            git commit -m "Daily report $(date -u +%Y-%m-%d)"
            # Rebase über zwischenzeitlich gepushte Commits, dann push.
            # Bis zu 3 Versuche, falls in der Zwischenzeit nochmal etwas reinkommt.
            pushed=0
            for attempt in 1 2 3; do
              if git pull --rebase origin main && git push; then
                pushed=1
                break
              fi
              echo "Push-Versuch $attempt fehlgeschlagen, retry in 5s..."
              sleep 5
            done
            if [ "$pushed" -ne 1 ]; then
              echo "Alle 3 Push-Versuche fehlgeschlagen — Action wird als failed markiert."
              exit 1
            fi
            echo "report_pushed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Keine Änderungen — nichts zu committen."
            echo "report_pushed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Telegram-Benachrichtigung
        if: success() && steps.commit_push.outputs.report_pushed == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        continue-on-error: true
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram-Secrets fehlen — Notification übersprungen (kein Fehler)."
            exit 0
          fi
          TODAY=$(TZ='Europe/Berlin' date +'%d.%m.%Y')
          SITE_URL="https://noelprogrammieren.github.io/Daily-report/"
          MESSAGE=$(printf '📊 *Daily Stock Report vom %s ist online*\n\n🔗 [Bericht öffnen](%s)' "$TODAY" "$SITE_URL")
          HTTP_CODE=$(curl -s -o /tmp/tg_response.json -w "%{http_code}" \
            -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "parse_mode=Markdown" \
            -d "disable_web_page_preview=false" \
            --data-urlencode "text=${MESSAGE}")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Telegram-Notification gesendet."
          else
            echo "Telegram-API antwortete mit HTTP $HTTP_CODE:"
            cat /tmp/tg_response.json || true
          fi

      - name: r5-Sofort-Alert (neue Top-Conviction Hot Takes)
        if: success() && hashFiles('r5_alert.json') != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        continue-on-error: true
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram-Secrets fehlen — r5-Alert übersprungen."
            exit 0
          fi
          SITE_URL="https://noelprogrammieren.github.io/Daily-report/"
          # Schleife über alle Alerts in r5_alert.json
          python3 - <<'PY'
          import json, os, subprocess
          data = json.load(open("r5_alert.json"))
          alerts = data.get("alerts", [])
          for a in alerts:
              company = a.get("company", "?")
              event_date = a.get("event_date", "")
              event = a.get("event_basis", "")[:160]
              mv = a.get("expected_move_pct") or {}
              if mv.get("low") is not None and mv.get("high") is not None:
                  direction = mv.get("direction", "up")
                  sign = "+" if direction == "up" else "-"
                  move = f"{sign}{mv['low']}–{sign}{mv['high']}%"
              else:
                  move = ""
              pt = a.get("price_target") or {}
              target = ""
              if pt.get("low") is not None and pt.get("high") is not None:
                  target = f"{pt['low']}–{pt['high']} {pt.get('currency','')}".strip()
              msg = f"⚡ *Neuer Hot Take · {company} · ⭐ 5/5*\n"
              if event_date:
                  msg += f"📅 {event_date}\n"
              if move or target:
                  parts = []
                  if move: parts.append(f"Erwartet: {move}")
                  if target: parts.append(f"Kursziel: {target}")
                  msg += " · ".join(parts) + "\n"
              if event:
                  msg += f"\n{event}\n"
              msg += f"\n🔗 [Bericht öffnen](https://noelprogrammieren.github.io/Daily-report/)"
              r = subprocess.run([
                  "curl", "-s", "-X", "POST",
                  f"https://api.telegram.org/bot{os.environ['TELEGRAM_BOT_TOKEN']}/sendMessage",
                  "-d", f"chat_id={os.environ['TELEGRAM_CHAT_ID']}",
                  "-d", "parse_mode=Markdown",
                  "-d", "disable_web_page_preview=true",
                  "--data-urlencode", f"text={msg}",
              ], capture_output=True, text=True)
              print(f"r5-Alert {company}: {r.returncode}")
          PY

  deploy:
    needs: generate
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout (post-commit)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
